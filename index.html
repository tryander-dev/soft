<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browser</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 30px 20px;
    gap: 16px;
}

/* ── URL блок ── */
.section {
    width: 100%;
    max-width: 960px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 6px;
    overflow: hidden;
}

.section-header {
    padding: 10px 16px;
    background: #f0f0f0;
    border-bottom: 1px solid #ccc;
    font-size: 13px;
    font-weight: 600;
    color: #333;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.url-row {
    display: flex;
    gap: 8px;
    padding: 14px;
}

.url-row input {
    flex: 1;
    padding: 10px 14px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
    outline: none;
    color: #111;
}

.url-row input:focus { border-color: #888; }

.btn {
    padding: 10px 20px;
    font-size: 14px;
    border: 1px solid #bbb;
    border-radius: 4px;
    background: #fff;
    color: #111;
    cursor: pointer;
    white-space: nowrap;
}
.btn:hover { background: #f0f0f0; }
.btn.danger { color: #c0392b; border-color: #e0b0b0; }
.btn.danger:hover { background: #fdf0f0; }

/* ── Cookie блок ── */
.cookie-form {
    display: grid;
    grid-template-columns: 1fr 1fr auto auto;
    gap: 8px;
    padding: 14px;
    border-bottom: 1px solid #eee;
    align-items: end;
}

.field {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.field label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.field input, .field select {
    padding: 8px 10px;
    font-size: 13px;
    border: 1px solid #ccc;
    border-radius: 4px;
    outline: none;
    color: #111;
    background: #fff;
}

.field input:focus { border-color: #888; }

.cookie-table-wrap {
    padding: 0 14px 14px;
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-top: 14px;
}

th {
    text-align: left;
    padding: 7px 10px;
    border-bottom: 1px solid #ddd;
    color: #888;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
}

td {
    padding: 8px 10px;
    border-bottom: 1px solid #f0f0f0;
    color: #222;
    vertical-align: middle;
    word-break: break-all;
}

tr:last-child td { border-bottom: none; }

td.del-cell {
    width: 36px;
    text-align: center;
}

.del-btn {
    background: none;
    border: none;
    color: #ccc;
    font-size: 16px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
    line-height: 1;
}
.del-btn:hover { background: #fdf0f0; color: #c0392b; }

.empty-row td {
    color: #bbb;
    text-align: center;
    padding: 20px;
    font-size: 13px;
}

.tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 11px;
    background: #f0f0f0;
    color: #555;
}
</style>
</head>
<body>

<!-- URL секция -->
<div class="section">
    <div class="section-header">🌐 Открыть ссылку</div>
    <div class="url-row">
        <input id="linkInput" placeholder="https://example.com"
               onkeydown="if(event.key==='Enter') openLink()">
        <button class="btn" onclick="openLink()">Открыть в новой вкладке</button>
    </div>
</div>

<!-- Cookie Manager -->
<div class="section">
    <div class="section-header">
        🍪 Cookie Manager
        <button class="btn" onclick="refreshTable()" style="padding:4px 12px;font-size:12px;">↻ Обновить</button>
    </div>

    <!-- Форма создания -->
    <div class="cookie-form">
        <div class="field">
            <label>Название</label>
            <input id="cName" placeholder="my_cookie">
        </div>
        <div class="field">
            <label>Значение</label>
            <input id="cValue" placeholder="value123">
        </div>
        <div class="field">
            <label>Срок (дней)</label>
            <input id="cDays" placeholder="30" type="number" min="0" style="width:90px">
        </div>
        <div style="padding-bottom:1px">
            <button class="btn" onclick="addCookie()" style="height:37px">+ Добавить</button>
        </div>
    </div>

    <!-- Таблица кук -->
    <div class="cookie-table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Название</th>
                    <th>Значение</th>
                    <th>Домен</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="cookieTable"></tbody>
        </table>
    </div>
</div>

<script>
// ── Открыть ссылку ──
function openLink() {
    let url = document.getElementById("linkInput").value.trim();
    if (!url) return;
    if (!url.startsWith("http")) url = "https://" + url;
    window.open(url, "_blank");
}

// ── Cookie Manager ──
function addCookie() {
    const name  = document.getElementById("cName").value.trim();
    const value = document.getElementById("cValue").value.trim();
    const days  = parseInt(document.getElementById("cDays").value) || 30;

    if (!name) { alert("Введите название куки"); return; }

    const expires = new Date();
    expires.setDate(expires.getDate() + days);

    document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value)}; expires=${expires.toUTCString()}; path=/`;

    document.getElementById("cName").value = "";
    document.getElementById("cValue").value = "";
    document.getElementById("cDays").value = "";

    refreshTable();
}

function deleteCookie(name) {
    document.cookie = `${encodeURIComponent(name)}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/`;
    refreshTable();
}

function getCookies() {
    if (!document.cookie) return [];
    return document.cookie.split(";").map(c => {
        const idx = c.indexOf("=");
        return {
            name:  decodeURIComponent(c.slice(0, idx).trim()),
            value: decodeURIComponent(c.slice(idx + 1).trim())
        };
    }).filter(c => c.name);
}

function refreshTable() {
    const cookies = getCookies();
    const tbody = document.getElementById("cookieTable");
    const domain = location.hostname || "localhost";

    if (cookies.length === 0) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="4">Куки не найдены</td></tr>`;
        return;
    }

    tbody.innerHTML = cookies.map(c => `
        <tr>
            <td><strong>${esc(c.name)}</strong></td>
            <td>${esc(c.value)}</td>
            <td><span class="tag">${domain}</span></td>
            <td class="del-cell">
                <button class="del-btn" onclick="deleteCookie('${esc(c.name)}')" title="Удалить">✕</button>
            </td>
        </tr>
    `).join("");
}

function esc(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Инит
refreshTable();
</script>

</body>
</html>
