<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open Link</title>
<style>
body{
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
}

.box{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
    width:300px;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin-left:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <input id="linkInput" placeholder="https://example.com">
    <button onclick="go()">Open</button>
</div>

<script>
function go(){
    let url = document.getElementById("linkInput").value;

    if(!url.startsWith("http")){
        url = "https://" + url;
    }

    window.location.href = url;
}
</script>

</body>
</html>
