<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browser</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 30px 20px;
}

.top-bar {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 960px;
    margin-bottom: 16px;
}

.top-bar input {
    flex: 1;
    padding: 10px 14px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
    outline: none;
    background: #fff;
    color: #111;
}

.top-bar input:focus {
    border-color: #888;
}

.top-bar button {
    padding: 10px 20px;
    font-size: 14px;
    border: 1px solid #bbb;
    border-radius: 4px;
    background: #fff;
    color: #111;
    cursor: pointer;
    transition: background 0.15s;
}

.top-bar button:hover {
    background: #f0f0f0;
}

.browser-window {
    width: 100%;
    max-width: 960px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 540px;
}

.browser-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: #f0f0f0;
    border-bottom: 1px solid #ccc;
}

.dots {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
}

.dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
}

.dot.red    { background: #ff5f57; }
.dot.yellow { background: #febc2e; }
.dot.green  { background: #28c840; }

.url-bar {
    flex: 1;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 13px;
    color: #333;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.close-btn {
    background: none;
    border: none;
    font-size: 16px;
    color: #888;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
    line-height: 1;
}

.close-btn:hover {
    background: #ddd;
    color: #333;
}

.browser-body {
    flex: 1;
    position: relative;
    min-height: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.browser-body iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
}

.placeholder {
    color: #aaa;
    font-size: 14px;
    text-align: center;
    line-height: 2;
    user-select: none;
}

.error-msg {
    display: none;
    color: #c0392b;
    font-size: 13px;
    text-align: center;
}

.error-msg a {
    color: #333;
}
</style>
</head>
<body>

<div class="top-bar">
    <input id="linkInput" placeholder="https://example.com"
           onkeydown="if(event.key==='Enter') go()">
    <button onclick="go()">Открыть</button>
</div>

<div class="browser-window">
    <div class="browser-header">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="url-bar" id="urlBar">—</div>
        <button class="close-btn" onclick="closePage()">✕</button>
    </div>
    <div class="browser-body" id="browserBody">
        <div class="placeholder" id="placeholder">Введите ссылку и нажмите «Открыть»</div>
        <div class="error-msg" id="errorMsg">
            Сайт не поддерживает встраивание. &nbsp;
            <a href="#" id="directLink" target="_blank">Открыть в новой вкладке →</a>
        </div>
    </div>
</div>

<script>
function go() {
    let url = document.getElementById("linkInput").value.trim();
    if (!url) return;
    if (!url.startsWith("http")) url = "https://" + url;

    document.getElementById("placeholder").style.display = "none";
    document.getElementById("errorMsg").style.display = "none";

    const old = document.querySelector("#browserBody iframe");
    if (old) old.remove();

    const iframe = document.createElement("iframe");
    iframe.src = url;
    iframe.sandbox = "allow-scripts allow-same-origin allow-forms allow-popups";
    document.getElementById("browserBody").appendChild(iframe);
    document.getElementById("urlBar").textContent = url;
    document.getElementById("directLink").href = url;
}

function closePage() {
    const old = document.querySelector("#browserBody iframe");
    if (old) old.remove();
    document.getElementById("placeholder").style.display = "block";
    document.getElementById("errorMsg").style.display = "none";
    document.getElementById("urlBar").textContent = "—";
    document.getElementById("linkInput").value = "";
}
</script>

</body>
</html>
