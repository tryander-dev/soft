<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browser</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 30px 20px;
}

.top-bar {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 960px;
    margin-bottom: 16px;
}

.top-bar input {
    flex: 1;
    padding: 10px 14px;
    font-size: 14px;
    border: 1px solid #ccc;
    border-radius: 4px;
    outline: none;
    background: #fff;
    color: #111;
}

.top-bar input:focus { border-color: #888; }

.top-bar button {
    padding: 10px 20px;
    font-size: 14px;
    border: 1px solid #bbb;
    border-radius: 4px;
    background: #fff;
    color: #111;
    cursor: pointer;
}

.top-bar button:hover { background: #f0f0f0; }

.browser-window {
    width: 100%;
    max-width: 960px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 540px;
}

.browser-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: #f0f0f0;
    border-bottom: 1px solid #ccc;
}

.dots { display: flex; gap: 5px; flex-shrink: 0; }
.dot { width: 11px; height: 11px; border-radius: 50%; }
.dot.red    { background: #ff5f57; }
.dot.yellow { background: #febc2e; }
.dot.green  { background: #28c840; }

.url-bar {
    flex: 1;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 13px;
    color: #333;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.open-direct {
    flex-shrink: 0;
    padding: 4px 12px;
    font-size: 12px;
    border: 1px solid #bbb;
    border-radius: 4px;
    background: #fff;
    color: #333;
    cursor: pointer;
    text-decoration: none;
    display: none;
    white-space: nowrap;
}
.open-direct:hover { background: #f0f0f0; }

.close-btn {
    background: none;
    border: none;
    font-size: 16px;
    color: #888;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
    line-height: 1;
}
.close-btn:hover { background: #ddd; color: #333; }

.browser-body {
    flex: 1;
    position: relative;
    min-height: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.browser-body iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
}

.placeholder {
    color: #aaa;
    font-size: 14px;
    text-align: center;
    user-select: none;
}

/* Спиннер */
.loader {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    color: #999;
    font-size: 14px;
}

.spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #ddd;
    border-top-color: #888;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Ошибка */
.blocked-msg {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
    color: #444;
    font-size: 14px;
    line-height: 1.6;
}

.blocked-msg .icon { font-size: 36px; }

.blocked-msg a {
    display: inline-block;
    padding: 8px 20px;
    border: 1px solid #bbb;
    border-radius: 4px;
    background: #fff;
    color: #111;
    text-decoration: none;
    font-size: 14px;
}

.blocked-msg a:hover { background: #f0f0f0; }
</style>
</head>
<body>

<div class="top-bar">
    <input id="linkInput" placeholder="https://example.com"
           onkeydown="if(event.key==='Enter') go()">
    <button onclick="go()">Открыть</button>
</div>

<div class="browser-window">
    <div class="browser-header">
        <div class="dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="url-bar" id="urlBar">—</div>
        <a class="open-direct" id="openDirect" target="_blank">↗ Открыть напрямую</a>
        <button class="close-btn" onclick="closePage()">✕</button>
    </div>
    <div class="browser-body" id="browserBody">
        <div class="placeholder" id="placeholder">Введите ссылку и нажмите «Открыть»</div>
        <div class="loader" id="loader">
            <div class="spinner"></div>
            Загрузка...
        </div>
        <div class="blocked-msg" id="blockedMsg">
            <span class="icon">🚫</span>
            <span>Сайт запрещает встраивание в iframe.<br>Это ограничение самого сайта — обойти нельзя.</span>
            <a href="#" id="blockedLink" target="_blank">Открыть в новой вкладке →</a>
        </div>
    </div>
</div>

<script>
let currentUrl = "";
let blockTimer = null;

function go() {
    let url = document.getElementById("linkInput").value.trim();
    if (!url) return;
    if (!url.startsWith("http")) url = "https://" + url;
    currentUrl = url;

    // Сброс
    clearTimeout(blockTimer);
    const old = document.querySelector("#browserBody iframe");
    if (old) old.remove();

    hide("placeholder");
    hide("blockedMsg");
    show("loader", "flex");

    document.getElementById("urlBar").textContent = url;
    document.getElementById("openDirect").href = url;
    document.getElementById("openDirect").style.display = "inline-block";
    document.getElementById("blockedLink").href = url;

    // Создаём iframe
    const iframe = document.createElement("iframe");
    iframe.src = url;
    iframe.sandbox = "allow-scripts allow-same-origin allow-forms allow-popups";
    iframe.style.display = "none";

    iframe.addEventListener("load", function () {
        clearTimeout(blockTimer);
        // Пробуем проверить что внутри (сработает только same-origin)
        let loaded = true;
        try {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            if (!doc || doc.body === null || doc.body.innerHTML.trim() === "") {
                loaded = false;
            }
        } catch(e) {
            // Cross-origin — значит что-то загрузилось, показываем
            loaded = true;
        }

        hide("loader");

        if (loaded) {
            iframe.style.display = "block";
        } else {
            showBlocked();
        }
    });

    iframe.addEventListener("error", function () {
        clearTimeout(blockTimer);
        hide("loader");
        showBlocked();
    });

    document.getElementById("browserBody").appendChild(iframe);

    // Таймаут 5 сек — если не загрузилось, считаем заблокированным
    blockTimer = setTimeout(function () {
        if (iframe.style.display === "none") {
            hide("loader");
            showBlocked();
        }
    }, 5000);
}

function showBlocked() {
    const old = document.querySelector("#browserBody iframe");
    if (old) old.remove();
    show("blockedMsg", "flex");
}

function closePage() {
    clearTimeout(blockTimer);
    const old = document.querySelector("#browserBody iframe");
    if (old) old.remove();
    hide("loader");
    hide("blockedMsg");
    show("placeholder", "block");
    document.getElementById("urlBar").textContent = "—";
    document.getElementById("openDirect").style.display = "none";
    document.getElementById("linkInput").value = "";
    currentUrl = "";
}

function show(id, type) {
    document.getElementById(id).style.display = type || "block";
}
function hide(id) {
    document.getElementById(id).style.display = "none";
}
</script>

</body>
</html>
